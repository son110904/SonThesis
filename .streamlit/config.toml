# Cấu hình Streamlit — khóa theme sáng (Page Theme Lock của taste-skill) và
# ẩn sidebar nav tự sinh để điều hướng hoàn toàn qua session_state.

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#c2562f"
backgroundColor = "#f3ddd4"
secondaryBackgroundColor = "#fff8f3"
textColor = "#3c2b25"
font = "sans serif"
