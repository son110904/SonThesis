# Cấu hình Streamlit — khóa theme sáng (Page Theme Lock của taste-skill) và
# ẩn sidebar nav tự sinh để điều hướng hoàn toàn qua session_state.
# Palette đồng bộ với design system trong src/frontend/utils/styling.py.

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#B85427"
backgroundColor = "#F8F2E9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A1007"
font = "sans serif"
